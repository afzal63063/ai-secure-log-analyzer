<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Secure Log Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* HEADER */
.header {
    padding: 20px;
    text-align: center;
    background: #020617;
    font-size: 22px;
    font-weight: 600;
    border-bottom: 1px solid #1e293b;
}

/* MAIN */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
}

/* LEFT PANEL */
.left {
    width: 40%;
    background: #020617;
    padding: 20px;
    border-radius: 12px;
}

textarea {
    width: 100%;
    height: 150px;
    background: #0f172a;
    border: none;
    border-radius: 10px;
    padding: 10px;
    color: white;
}

input[type="file"] {
    margin: 10px 0;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    cursor: pointer;
    font-weight: 600;
}

button:hover {
    opacity: 0.9;
}

/* RIGHT PANEL */
.right {
    width: 60%;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* CARDS */
.card {
    background: #020617;
    padding: 15px;
    border-radius: 12px;
    animation: fadeIn 0.5s ease-in-out;
}

/* RISK BADGE */
.badge {
    padding: 5px 10px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: bold;
}

.high { background: #ef4444; }
.medium { background: #f59e0b; }
.low { background: #22c55e; }

/* FINDINGS */
.finding {
    display: flex;
    justify-content: space-between;
    margin: 5px 0;
    padding: 8px;
    background: #0f172a;
    border-radius: 8px;
}

/* LOADER */
.loader {
    display: none;
    text-align: center;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="header">
🚀 AI Secure Log Analyzer Dashboard
</div>

<div class="container">

<!-- LEFT SIDE -->
<div class="left">
    <h3>📂 Input Logs</h3>
    <input type="file" id="file">
    <textarea id="log" placeholder="Paste logs here..."></textarea>
    <button onclick="analyze()">Analyze</button>
</div>

<!-- RIGHT SIDE -->
<div class="right">

<div class="card">
    <h3>📊 Summary</h3>
    <p id="summary">No data</p>
</div>

<div class="card">
    <h3>⚠ Risk Level</h3>
    <span id="riskLevel" class="badge">-</span>
    <p>Score: <span id="riskScore">0</span></p>
</div>

<div class="card">
    <h3>🔍 Findings</h3>
    <div id="findings"></div>
</div>

<div class="card">
    <h3>🤖 Insights</h3>
    <ul id="insights"></ul>
</div>

<div class="loader" id="loader">Analyzing...</div>

</div>
</div>

<script>
function analyze() {
    const fileInput = document.getElementById("file").files[0];
    const log = document.getElementById("log").value;

    document.getElementById("loader").style.display = "block";

    if (fileInput) {
        const formData = new FormData();
        formData.append("file", fileInput);

        fetch("/analyze", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(updateUI)
        .catch(showError);

    } else {
        fetch("/analyze", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                input_type: "log",
                content: log
            })
        })
        .then(res => res.json())
        .then(updateUI)
        .catch(showError);
    }
}

function updateUI(data) {
    document.getElementById("loader").style.display = "none";

    document.getElementById("summary").innerText = data.summary;

    let level = data.risk_level;
    let badge = document.getElementById("riskLevel");
    badge.innerText = level.toUpperCase();
    badge.className = "badge " + level;

    document.getElementById("riskScore").innerText = data.risk_score;

    // Findings
    let findingsHTML = "";
    data.findings.forEach(f => {
        findingsHTML += `
        <div class="finding">
            <span>${f.type}: ${f.value}</span>
            <span class="badge ${f.risk}">${f.risk}</span>
        </div>`;
    });
    document.getElementById("findings").innerHTML = findingsHTML;

    // Insights
    let insightsHTML = "";
    data.insights.forEach(i => {
        insightsHTML += `<li>${i}</li>`;
    });
    document.getElementById("insights").innerHTML = insightsHTML;
}

function showError(err) {
    document.getElementById("loader").innerText = "Error: " + err;
}
</script>

</body>
</html>
