<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Secure Log Analyzer</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    width: 90%;
    max-width: 900px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease-in-out;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

.upload-box {
    border: 2px dashed #38bdf8;
    padding: 20px;
    text-align: center;
    border-radius: 12px;
    margin-bottom: 15px;
    transition: 0.3s;
}

.upload-box:hover {
    background: rgba(56,189,248,0.1);
}

textarea {
    width: 100%;
    height: 150px;
    border-radius: 10px;
    border: none;
    padding: 15px;
    margin-top: 10px;
    background: #0f172a;
    color: white;
    resize: none;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #38bdf8, #6366f1);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

.result-box {
    margin-top: 20px;
    background: #020617;
    padding: 20px;
    border-radius: 12px;
    max-height: 300px;
    overflow-y: auto;
}

pre {
    white-space: pre-wrap;
}

.loader {
    display: none;
    margin: 10px auto;
    border: 5px solid #ccc;
    border-top: 5px solid #38bdf8;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px);}
    to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 AI Secure Log Analyzer</h1>

<div class="upload-box">
    <input type="file" id="file">
    <p>Upload .log / .txt file OR paste logs below</p>
</div>

<textarea id="log" placeholder="Paste logs here..."></textarea>

<button onclick="analyze()">Analyze Logs</button>

<div class="loader" id="loader"></div>

<div class="result-box">
    <h3>📊 Analysis Result</h3>
    <pre id="result">No results yet...</pre>
</div>

</div>

<script>
function analyze() {
    const fileInput = document.getElementById("file").files[0];
    const input = document.getElementById("log").value;
    const loader = document.getElementById("loader");
    const resultBox = document.getElementById("result");

    loader.style.display = "block";
    resultBox.innerText = "Analyzing...";

    if (fileInput) {
        const formData = new FormData();
        formData.append("file", fileInput);

        fetch("/analyze", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(showResult)
        .catch(showError);

    } else {
        fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                input_type: "log",
                content: input
            })
        })
        .then(res => res.json())
        .then(showResult)
        .catch(showError);
    }
}

function showResult(data) {
    document.getElementById("loader").style.display = "none";

    // Format nicely
    document.getElementById("result").innerText =
        JSON.stringify(data, null, 2);
}

function showError(err) {
    document.getElementById("loader").style.display = "none";
    document.getElementById("result").innerText =
        "❌ Error: " + err;
}
</script>

</body>
</html>
